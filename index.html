<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Бокс Таймер Pro</title>
<link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background: black;
    display: flex;
    flex-direction: row;
    min-height: 100vh;
    --c: red;
    color: var(--c);
    overflow-x: hidden;
}

/* ===== SETTINGS PANEL ===== */
#settings-panel {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    width: 260px;
    background: #050505;
    border-right: 2px solid var(--c);
    box-shadow: 4px 0 18px var(--c);
    transform: translateX(-264px);
    transition: transform 0.3s ease;
    overflow-y: auto;
    z-index: 100;
    padding: 12px 14px 20px;
}
#settings-panel.open { transform: translateX(0); }

.stitle {
    font-family: 'Times New Roman', Times, serif;
    font-size: 13px;
    color: var(--c);
    letter-spacing: 3px;
    text-shadow: 0 0 8px var(--c);
    border-bottom: 1px solid var(--c);
    padding-bottom: 3px;
    margin: 14px 0 7px;
    text-transform: uppercase;
    opacity: 0.85;
}
.stitle:first-child { margin-top: 2px; }

label {
    font-family: 'Times New Roman', Times, serif;
    font-size: 13px;
    color: var(--c);
    opacity: 0.65;
    display: block;
    margin-bottom: 4px;
    letter-spacing: 1px;
}

select {
    width: 100%;
    font-family: 'Times New Roman', Times, serif;
    font-size: 14px;
    background: #000;
    color: var(--c);
    border: 2px solid var(--c);
    padding: 5px 7px;
    box-shadow: 0 0 6px var(--c);
    margin-bottom: 2px;
}
select option { background: #000; color: var(--c); }

.rrow { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
input[type=range] { flex: 1; accent-color: var(--c); cursor: pointer; }
.rval {
    min-width: 44px;
    font-family: 'DS-Digital', monospace;
    font-size: 15px;
    color: var(--c);
    text-align: right;
    text-shadow: 0 0 6px var(--c);
}

.cgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

/* ===== ALL BUTTONS ===== */
button {
    font-family: 'Times New Roman', Times, serif;
    font-size: 17px;
    font-weight: bold;
    letter-spacing: 2px;
    padding: 9px 22px;
    background: #000;
    color: var(--c);
    border: 2px solid var(--c);
    cursor: pointer;
    box-shadow: 0 0 10px var(--c);
    text-transform: uppercase;
    transition: background 0.15s, box-shadow 0.15s;
}
button:hover { background: #0c0000; box-shadow: 0 0 18px var(--c); }
button:active { transform: scale(0.97); }
.cbtn { font-size: 14px; padding: 7px 6px; letter-spacing: 1px; }

/* ===== GEAR TOGGLE ===== */
#settings-toggle {
    position: fixed;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    width: 38px; height: 38px;
    font-size: 20px;
    padding: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
    transition: left 0.3s;
}
#settings-toggle.open { left: 268px; }

/* ===== MAIN CENTER AREA ===== */
#main-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 0;
    padding: 20px;
}

#phase-label {
    font-family: 'DS-Digital', monospace;
    font-size: 42px;
    letter-spacing: 5px;
    color: var(--c);
    text-shadow: 0 0 14px var(--c), 0 0 4px var(--c);
    height: 52px;
    text-align: center;
    margin-bottom: 2px;
}

#timer {
    font-family: 'DS-Digital', monospace;
    font-size: 140px;
    line-height: 1;
    letter-spacing: 8px;
    text-align: center;
    color: var(--c);
    text-shadow: 0 0 40px var(--c), 0 0 10px var(--c), 0 0 2px var(--c);
    /* ghost digits behind */
    position: relative;
}
#timer::before {
    content: "88:88";
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    color: var(--c);
    opacity: 0.07;
    pointer-events: none;
    font-size: 140px;
    letter-spacing: 8px;
}

.progress-bar {
    width: min(460px, 85vw);
    height: 5px;
    background: rgba(255,255,255,0.07);
    border-radius: 3px;
    overflow: hidden;
    margin: 10px 0 8px;
}
.progress-fill {
    height: 100%;
    background: var(--c);
    box-shadow: 0 0 8px var(--c);
    transition: width 1s linear;
    width: 100%;
}

#round-dots {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    min-height: 18px;
    margin-bottom: 18px;
}
.dot {
    width: 13px; height: 13px;
    border-radius: 50%;
    border: 2px solid var(--c);
    opacity: 0.3;
}
.dot.done { background: var(--c); opacity: 0.5; }
.dot.active { background: var(--c); opacity: 1; box-shadow: 0 0 10px var(--c); animation: dp .9s infinite alternate; }
@keyframes dp { from { opacity: 0.55; } to { opacity: 1; } }

.ctrl-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
}
</style>
</head>
<body>

<button id="settings-toggle">&#9881;</button>

<div id="settings-panel">
    <div class="stitle" id="lbl-lang">ЯЗЫК</div>
    <select id="langSelect">
        <option value="ru">Русский</option>
        <option value="en">English</option>
        <option value="uk">Українська</option>
        <option value="cs">Čeština</option>
        <option value="pl">Polski</option>
        <option value="de">Deutsch</option>
        <option value="es">Español</option>
    </select>

    <div class="stitle" id="lbl-rounds-hdr">РАУНДЫ</div>
    <label id="lbl-rounds">Количество раундов</label>
    <select id="roundSelect">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5" selected>5</option>
        <option value="6">6</option>
        <option value="8">8</option>
        <option value="10">10</option>
        <option value="12">12</option>
        <option value="15">15</option>
    </select>

    <div class="stitle" id="lbl-time-hdr">ВРЕМЯ</div>
    <label id="lbl-prep">Подготовка (сек)</label>
    <div class="rrow">
        <input type="range" id="prepRange" min="5" max="60" step="5" value="15">
        <span class="rval" id="prepVal">15s</span>
    </div>
    <label id="lbl-work" style="margin-top:8px">Раунд (мин)</label>
    <div class="rrow">
        <input type="range" id="workRange" min="1" max="5" step="0.5" value="3">
        <span class="rval" id="workVal">3:00</span>
    </div>
    <label id="lbl-rest" style="margin-top:8px">Отдых (сек)</label>
    <div class="rrow">
        <input type="range" id="restRange" min="15" max="120" step="15" value="60">
        <span class="rval" id="restVal">60s</span>
    </div>

    <div class="stitle" id="lbl-sound-hdr">ЗВУК</div>
    <label id="lbl-sound">Тип звука</label>
    <select id="soundSelect">
        <option value="bell" id="opt-bell">Боксёрский гонг</option>
        <option value="buzzer" id="opt-buzzer">Зуммер</option>
        <option value="retro" id="opt-retro">Ретро 8-бит</option>
    </select>
    <button id="testSoundBtn" style="width:100%;margin-top:8px;font-size:14px;padding:7px;">&#9654; ТЕСТ</button>

    <div class="stitle" id="lbl-color-hdr">ЦВЕТ</div>
    <div class="cgrid">
        <button class="cbtn" onclick="setColor('red')" id="btnRed">RED</button>
        <button class="cbtn" onclick="setColor('lime')" id="btnGreen">GREEN</button>
        <button class="cbtn" onclick="setColor('yellow')" id="btnYellow">YELLOW</button>
        <button class="cbtn" onclick="setColor('cyan')" id="btnCyan">CYAN</button>
        <button class="cbtn" onclick="setColor('white')" id="btnWhite">WHITE</button>
        <button class="cbtn" onclick="setColor('#ff8800')" id="btnOrange">ORANGE</button>
    </div>
</div>

<div id="main-area">
    <div id="phase-label">БОЙ!</div>
    <div id="timer">00:00</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div id="round-dots"></div>
    <div class="ctrl-row">
        <button id="startBtn">СТАРТ</button>
        <button id="stopBtn">СТОП</button>
        <button id="resetBtn">СБРОС</button>
    </div>
</div>

<script>
let audioCtx = null, timerInterval = null;
let PREP_TIME = 15, WORK_TIME = 180, REST_TIME = 60;
let timeLeft = WORK_TIME, totalTimeForPhase = WORK_TIME;
let currentRound = 1, totalRounds = 5, phase = 'idle';

const TR = {
    ru: { round:"РАУНД", rest:"ОТДЫХ", prep:"ПОДГОТОВКА", end:"БОЙ ОКОНЧЕН!", start:"СТАРТ", stop:"СТОП", reset:"СБРОС",
          cRed:"RED", cGreen:"GREEN", cYellow:"YELLOW", cCyan:"CYAN", cWhite:"WHITE", cOrange:"ORANGE",
          lang:"ЯЗЫК", rounds:"РАУНДЫ", roundsLbl:"Количество раундов", time:"ВРЕМЯ", prepLbl:"Подготовка (сек)",
          workLbl:"Раунд (мин)", restLbl:"Отдых (сек)", sound:"ЗВУК", soundLbl:"Тип звука", color:"ЦВЕТ",
          bell:"Боксёрский гонг", buzzer:"Зуммер", retro:"Ретро 8-бит", test:"ТЕСТ", title:"БОЙ!" },
    en: { round:"ROUND", rest:"REST", prep:"PREPARE", end:"FIGHT OVER!", start:"START", stop:"STOP", reset:"RESET",
          cRed:"RED", cGreen:"GREEN", cYellow:"YELLOW", cCyan:"CYAN", cWhite:"WHITE", cOrange:"ORANGE",
          lang:"LANGUAGE", rounds:"ROUNDS", roundsLbl:"Number of rounds", time:"TIME", prepLbl:"Prep time (sec)",
          workLbl:"Round time (min)", restLbl:"Rest time (sec)", sound:"SOUND", soundLbl:"Sound type", color:"COLOR",
          bell:"Boxing bell", buzzer:"Buzzer", retro:"Retro 8-bit", test:"TEST", title:"FIGHT!" },
    uk: { round:"РАУНД", rest:"ВІДПОЧИНОК", prep:"ПІДГОТОВКА", end:"БІЙ ЗАКІНЧЕНО!", start:"СТАРТ", stop:"СТОП", reset:"СКИДАННЯ",
          cRed:"RED", cGreen:"GREEN", cYellow:"YELLOW", cCyan:"CYAN", cWhite:"WHITE", cOrange:"ORANGE",
          lang:"МОВА", rounds:"РАУНДИ", roundsLbl:"Кількість раундів", time:"ЧАС", prepLbl:"Підготовка (сек)",
          workLbl:"Раунд (хв)", restLbl:"Відпочинок (сек)", sound:"ЗВУК", soundLbl:"Тип звуку", color:"КОЛІР",
          bell:"Боксерський гонг", buzzer:"Зумер", retro:"Ретро 8-біт", test:"ТЕСТ", title:"БІЙ!" },
    cs: { round:"KOLO", rest:"ODPOČINEK", prep:"PŘÍPRAVA", end:"KONEC ZÁPASU!", start:"START", stop:"STOP", reset:"RESET",
          cRed:"RED", cGreen:"GREEN", cYellow:"YELLOW", cCyan:"CYAN", cWhite:"WHITE", cOrange:"ORANGE",
          lang:"JAZYK", rounds:"KOLA", roundsLbl:"Počet kol", time:"ČAS", prepLbl:"Příprava (sek)",
          workLbl:"Kolo (min)", restLbl:"Odpočinek (sek)", sound:"ZVUK", soundLbl:"Typ zvuku", color:"BARVA",
          bell:"Boxerský gong", buzzer:"Bzučák", retro:"Retro 8-bit", test:"TEST", title:"BOJ!" },
    pl: { round:"RUNDA", rest:"PRZERWA", prep:"PRZYGOTOWANIE", end:"KONIEC WALKI!", start:"START", stop:"STOP", reset:"RESET",
          cRed:"RED", cGreen:"GREEN", cYellow:"YELLOW", cCyan:"CYAN", cWhite:"WHITE", cOrange:"ORANGE",
          lang:"JĘZYK", rounds:"RUNDY", roundsLbl:"Liczba rund", time:"CZAS", prepLbl:"Przygotowanie (sek)",
          workLbl:"Runda (min)", restLbl:"Przerwa (sek)", sound:"DŹWIĘK", soundLbl:"Typ dźwięku", color:"KOLOR",
          bell:"Gong bokserski", buzzer:"Brzęczyk", retro:"Retro 8-bit", test:"TEST", title:"WALKA!" },
    de: { round:"RUNDE", rest:"PAUSE", prep:"VORBEREITUNG", end:"KAMPF BEENDET!", start:"START", stop:"STOP", reset:"RESET",
          cRed:"RED", cGreen:"GREEN", cYellow:"YELLOW", cCyan:"CYAN", cWhite:"WHITE", cOrange:"ORANGE",
          lang:"SPRACHE", rounds:"RUNDEN", roundsLbl:"Rundenanzahl", time:"ZEIT", prepLbl:"Vorbereitung (Sek)",
          workLbl:"Runde (Min)", restLbl:"Pause (Sek)", sound:"SOUND", soundLbl:"Soundtyp", color:"FARBE",
          bell:"Boxglocke", buzzer:"Buzzer", retro:"Retro 8-Bit", test:"TEST", title:"KAMPF!" },
    es: { round:"ASALTO", rest:"DESCANSO", prep:"PREPARACIÓN", end:"¡COMBATE TERMINADO!", start:"INICIO", stop:"PARAR", reset:"REINICIAR",
          cRed:"RED", cGreen:"GREEN", cYellow:"YELLOW", cCyan:"CYAN", cWhite:"WHITE", cOrange:"ORANGE",
          lang:"IDIOMA", rounds:"ASALTOS", roundsLbl:"Número de asaltos", time:"TIEMPO", prepLbl:"Preparación (seg)",
          workLbl:"Asalto (min)", restLbl:"Descanso (seg)", sound:"SONIDO", soundLbl:"Tipo de sonido", color:"COLOR",
          bell:"Gong de boxeo", buzzer:"Zumbador", retro:"Retro 8-bits", test:"PROBAR", title:"¡PELEA!" }
};

function getT() { return TR[document.getElementById('langSelect').value]; }

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playBell(type) {
    if (!audioCtx) return;
    const ct = audioCtx.currentTime;
    if (type === 'bell') {
        [[880,440,0.8],[1320,660,0.4]].forEach(([f1,f2,vol]) => {
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'sine'; o.frequency.setValueAtTime(f1,ct); o.frequency.exponentialRampToValueAtTime(f2,ct+1.0);
            g.gain.setValueAtTime(vol,ct); g.gain.exponentialRampToValueAtTime(0.001,ct+1.8);
            o.connect(g); g.connect(audioCtx.destination); o.start(ct); o.stop(ct+1.8);
        });
    } else if (type === 'buzzer') {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = 'sawtooth'; o.frequency.value = 110;
        g.gain.setValueAtTime(0.7,ct); g.gain.setValueAtTime(0.7,ct+0.55); g.gain.linearRampToValueAtTime(0,ct+0.7);
        o.connect(g); g.connect(audioCtx.destination); o.start(ct); o.stop(ct+0.7);
    } else {
        [0,0.14,0.28].forEach((d,i) => {
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'square'; o.frequency.value = [523,659,784][i];
            g.gain.setValueAtTime(0.3,ct+d); g.gain.setValueAtTime(0,ct+d+0.12);
            o.connect(g); g.connect(audioCtx.destination); o.start(ct+d); o.stop(ct+d+0.13);
        });
    }
}

function beepTick(type) {
    if (!audioCtx) return;
    const ct = audioCtx.currentTime;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type === 'retro' ? 'square' : type === 'buzzer' ? 'sawtooth' : 'sine';
    o.frequency.value = type === 'buzzer' ? 700 : type === 'retro' ? 880 : 1100;
    g.gain.setValueAtTime(0.35,ct); g.gain.linearRampToValueAtTime(0,ct+0.07);
    o.connect(g); g.connect(audioCtx.destination); o.start(ct); o.stop(ct+0.08);
}

function setColor(c) {
    document.body.style.setProperty('--c', c);
}

function updateDots() {
    const el = document.getElementById('round-dots');
    el.innerHTML = '';
    for (let i = 1; i <= totalRounds; i++) {
        const d = document.createElement('div');
        d.className = 'dot' + (i < currentRound ? ' done' : i === currentRound && phase === 'work' ? ' active' : '');
        el.appendChild(d);
    }
}

function updateProgress() {
    const pct = totalTimeForPhase > 0 ? (timeLeft / totalTimeForPhase) * 100 : 0;
    document.getElementById('progressFill').style.width = pct + '%';
}

function updateUI() {
    const t = getT();
    const mins = Math.floor(timeLeft / 60), secs = timeLeft % 60;
    document.getElementById('timer').textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;

    let label = t.title;
    if (phase === 'prep') label = t.prep;
    else if (phase === 'work') label = `${t.round} ${currentRound} / ${totalRounds}`;
    else if (phase === 'rest') label = `${t.rest} ${currentRound}`;
    else if (phase === 'idle' && currentRound > 1) label = t.end;
    document.getElementById('phase-label').textContent = label;

    document.getElementById('startBtn').textContent = t.start;
    document.getElementById('stopBtn').textContent = t.stop;
    document.getElementById('resetBtn').textContent = t.reset;
    document.getElementById('btnRed').textContent = t.cRed;
    document.getElementById('btnGreen').textContent = t.cGreen;
    document.getElementById('btnYellow').textContent = t.cYellow;
    document.getElementById('btnCyan').textContent = t.cCyan;
    document.getElementById('btnWhite').textContent = t.cWhite;
    document.getElementById('btnOrange').textContent = t.cOrange;
    document.getElementById('lbl-lang').textContent = t.lang;
    document.getElementById('lbl-rounds-hdr').textContent = t.rounds;
    document.getElementById('lbl-rounds').textContent = t.roundsLbl;
    document.getElementById('lbl-time-hdr').textContent = t.time;
    document.getElementById('lbl-prep').textContent = t.prepLbl;
    document.getElementById('lbl-work').textContent = t.workLbl;
    document.getElementById('lbl-rest').textContent = t.restLbl;
    document.getElementById('lbl-sound-hdr').textContent = t.sound;
    document.getElementById('lbl-sound').textContent = t.soundLbl;
    document.getElementById('lbl-color-hdr').textContent = t.color;
    document.getElementById('opt-bell').textContent = t.bell;
    document.getElementById('opt-buzzer').textContent = t.buzzer;
    document.getElementById('opt-retro').textContent = t.retro;
    document.getElementById('testSoundBtn').textContent = '▶ ' + t.test;
    updateDots();
    updateProgress();
}

function step() {
    const snd = document.getElementById('soundSelect').value;
    if (timeLeft > 0) {
        timeLeft--;
        if (timeLeft <= 3 && timeLeft > 0) beepTick(snd);
    } else {
        playBell(snd);
        if (phase === 'prep') { phase='work'; timeLeft=WORK_TIME; totalTimeForPhase=WORK_TIME; }
        else if (phase === 'work') {
            if (currentRound >= totalRounds) { clearInterval(timerInterval); timerInterval=null; phase='idle'; updateUI(); return; }
            phase='rest'; timeLeft=REST_TIME; totalTimeForPhase=REST_TIME;
        } else if (phase === 'rest') { currentRound++; phase='work'; timeLeft=WORK_TIME; totalTimeForPhase=WORK_TIME; }
    }
    updateUI();
}

document.getElementById('settings-toggle').onclick = function() {
    document.getElementById('settings-panel').classList.toggle('open');
    this.classList.toggle('open');
};

document.getElementById('startBtn').onclick = () => {
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (timerInterval) return;
    if (phase === 'idle') {
        totalRounds = parseInt(document.getElementById('roundSelect').value);
        PREP_TIME = parseInt(document.getElementById('prepRange').value);
        WORK_TIME = Math.round(parseFloat(document.getElementById('workRange').value) * 60);
        REST_TIME = parseInt(document.getElementById('restRange').value);
        currentRound = 1; phase='prep'; timeLeft=PREP_TIME; totalTimeForPhase=PREP_TIME;
    }
    timerInterval = setInterval(step, 1000);
    updateUI();
};

document.getElementById('stopBtn').onclick = () => { clearInterval(timerInterval); timerInterval = null; };

document.getElementById('resetBtn').onclick = () => {
    clearInterval(timerInterval); timerInterval = null;
    phase='idle'; currentRound=1; timeLeft=WORK_TIME; totalTimeForPhase=WORK_TIME; updateUI();
};

document.getElementById('testSoundBtn').onclick = () => {
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    playBell(document.getElementById('soundSelect').value);
};

document.getElementById('langSelect').onchange = updateUI;

document.getElementById('prepRange').oninput = function() {
    document.getElementById('prepVal').textContent = this.value + 's';
    if (phase === 'idle') PREP_TIME = parseInt(this.value);
};
document.getElementById('workRange').oninput = function() {
    const m = parseFloat(this.value), mi = Math.floor(m), s = Math.round((m-mi)*60);
    document.getElementById('workVal').textContent = `${mi}:${String(s).padStart(2,'0')}`;
    if (phase === 'idle') { WORK_TIME = Math.round(m*60); timeLeft=WORK_TIME; totalTimeForPhase=WORK_TIME; updateUI(); }
};
document.getElementById('restRange').oninput = function() {
    document.getElementById('restVal').textContent = this.value + 's';
    if (phase === 'idle') REST_TIME = parseInt(this.value);
};
document.getElementById('roundSelect').onchange = () => {
    if (phase === 'idle') totalRounds = parseInt(document.getElementById('roundSelect').value);
};

updateUI();
</script>
</body>
</html>
