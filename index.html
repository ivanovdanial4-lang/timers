<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Бокс Таймер</title>
<link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">
<style>
    body {
        background: black;
        color: red;
        font-family: 'DS-Digital', sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }
    #timer { font-size: 120px; text-shadow: 0 0 20px red; }
    #round { font-size: 50px; margin-bottom: 20px; }
    button {
        font-size: 20px; margin: 5px; padding: 10px 20px;
        background: #111; color: red; border: 2px solid red;
        cursor: pointer; box-shadow: 0 0 10px red;
    }
    select {
        font-size: 18px; margin-top: 10px;
        background: #111; color: white; border: 2px solid red;
    }
</style>
</head>
<body>

<div id="round">Раунд 1</div>
<div id="timer">03:00</div>

<div>
    <button id="start">Старт</button>
    <button id="stop">Стоп</button>
    <button id="reset">Сброс</button>
</div>

<br>
<div>
    <button id="btnRed" onclick="setColor('red')">Красный</button>
    <button id="btnGreen" onclick="setColor('lime')">Зелёный</button>
    <button id="btnYellow" onclick="setColor('yellow')">Жёлтый</button>
    <button id="btnCyan" onclick="setColor('cyan')">Голубой</button>
    <button id="btnWhite" onclick="setColor('white')">Белый</button>
</div>

<br>
<select id="roundSelect">
    <option value="2">2 раунда</option>
    <option value="3">3 раунда</option>
    <option value="5" selected>5 раундов</option>
    <option value="12">12 раундов</option>
</select>

<select id="langSelect">
    <option value="ru">Русский</option>
    <option value="en">English</option>
</select>

<script>
let audioCtx;
let roundTime = 180;
let restTime = 60;
let prepTime = 15;

let totalRounds = 5;
let currentRound = 1;
let seconds = roundTime;
let interval = null;
let state = "idle"; // idle, prep, work, rest

const timerEl = document.getElementById("timer");
const roundEl = document.getElementById("round");
const langSelect = document.getElementById("langSelect");
const roundSelect = document.getElementById("roundSelect");

const translations = {
    ru: { round:"Раунд", rest:"Отдых", prep:"Подготовка", end:"Бой окончен!", start:"Старт", stop:"Стоп", reset:"Сброс" },
    en: { round:"Round", rest:"Rest", prep:"Prepare", end:"Fight over!", start:"Start", stop:"Stop", reset:"Reset" }
};

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playBeep(freq, duration) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.value = freq;
    osc.start(); osc.stop(audioCtx.currentTime + duration);
}

function setColor(color) {
    document.body.style.color = color;
    document.querySelectorAll("button").forEach(btn => {
        btn.style.borderColor = color;
        btn.style.color = color;
        btn.style.boxShadow = `0 0 10px ${color}`;
    });
    timerEl.style.textShadow = `0 0 20px ${color}`;
}

function update() {
    let m = Math.floor(seconds / 60);
    let s = seconds % 60;
    timerEl.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    
    const t = translations[langSelect.value];
    if (state === "prep") roundEl.textContent = t.prep;
    else if (state === "rest") roundEl.textContent = `${t.rest} ${currentRound}`;
    else if (state === "work") roundEl.textContent = `${t.round} ${currentRound}`;
}

function tick() {
    if (seconds > 0) {
        seconds--;
        if (seconds < 3 && seconds >= 0) playBeep(800, 0.1); // Писк в конце
    } else {
        playBeep(200, 0.5); // Гонг
        
        if (state === "prep") {
            state = "work";
            seconds = roundTime;
        } else if (state === "work") {
            if (currentRound >= totalRounds) {
                clearInterval(interval);
                interval = null;
                state = "idle";
                roundEl.textContent = translations[langSelect.value].end;
                return;
            }
            state = "rest";
            seconds = restTime;
        } else if (state === "rest") {
            state = "work";
            currentRound++;
            seconds = roundTime;
        }
    }
    update();
}

document.getElementById("start").onclick = () => {
    initAudio();
    if (audioCtx.state === "suspended") audioCtx.resume();
    if (interval) return; // Если уже запущен, ничего не делать

    if (state === "idle") {
        state = "prep";
        seconds = prepTime;
        currentRound = 1;
    }
    interval = setInterval(tick, 1000);
};

document.getElementById("stop").onclick = () => {
    clearInterval(interval);
    interval = null;
};

document.getElementById("reset").onclick = () => {
    clearInterval(interval);
    interval = null;
    state = "idle";
    currentRound = 1;
    seconds = roundTime;
    update();
};

roundSelect.onchange = () => { totalRounds = parseInt(roundSelect.value); };
langSelect.onchange = () => { update(); };

update();
</script>
</body>
</html>
