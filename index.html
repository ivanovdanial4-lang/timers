<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Бокс Таймер</title>

<link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">

<style>
body {
  background:black;
  color:red;
  font-family:'DS-Digital', monospace;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
}

#timer {
  font-size:120px;
  text-shadow:0 0 20px red;
}

#round {
  font-size:50px;
  margin-bottom:20px;
}

button {
  font-size:20px;
  margin:5px;
  padding:10px 20px;
  background:#111;
  color:white;
  border:2px solid red;
}
</style>

</head>

<body>

<div id="round">Раунд 1</div>
<div id="timer">03:00</div>

<div>
  <button id="start">Старт</button>
  <button id="stop">Стоп</button>
  <button id="reset">Сброс</button>
</div>

<!-- ЗВУКИ -->
<audio id="gong" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"></audio>
<audio id="beep" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>
// настройки
let roundTime = 180;
let restTime = 60;
let currentRound = 1;
let totalRounds = 5;
let isRest = false;
let seconds = roundTime;
let interval = null;

// элементы
const timerEl = document.getElementById("timer");
const roundEl = document.getElementById("round");
const gong = document.getElementById("gong");
const beep = document.getElementById("beep");

// разблокировка звука
function unlockAudio() {
  gong.play().then(()=>gong.pause());
  beep.play().then(()=>beep.pause());
}

// обновление экрана
function update() {
  let m = Math.floor(seconds/60);
  let s = seconds % 60;
  timerEl.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  roundEl.textContent = isRest ? "Отдых" : "Раунд " + currentRound;
}

// таймер
function tick() {

  // 🔊 бипы последние 10 сек
  if (seconds <= 10 && seconds > 0) {
    beep.currentTime = 0;
    beep.play();
  }

  if (seconds > 0) {
    seconds--;
  } else {

    // 🔔 гонг
    gong.currentTime = 0;
    gong.play();

    if (!isRest) {
      isRest = true;
      seconds = restTime;
    } else {
      isRest = false;
      currentRound++;

      if (currentRound > totalRounds) {
        clearInterval(interval);
        timerEl.textContent = "00:00";
        roundEl.textContent = "Бой окончен!";
        return;
      }

      seconds = roundTime;
    }

    // 🔔 ещё один гонг
    gong.currentTime = 0;
    gong.play();
  }

  update();
}

// кнопки
document.getElementById("start").onclick = () => {
  unlockAudio(); // важно!
  if (!interval) interval = setInterval(tick, 1000);
};

document.getElementById("stop").onclick = () => {
  clearInterval(interval);
  interval = null;
};

document.getElementById("reset").onclick = () => {
  clearInterval(interval);
  interval = null;
  currentRound = 1;
  isRest = false;
  seconds = roundTime;
  update();
};

update();

</script>

</body>
</html>
