<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Бокс Таймер</title>

<link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">

<style>
body {
  background:black;
  color:red;
  font-family:'DS-Digital', monospace;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
}

#timer {
  font-size:120px;
  text-shadow:0 0 20px red;
}

#round {
  font-size:50px;
  margin-bottom:20px;
}

button {
  font-size:20px;
  margin:5px;
  padding:10px 20px;
  background:#111;
  color:red;
  border:2px solid red;
  cursor:pointer;
  box-shadow:0 0 10px red;
  transition:0.2s;
}
</style>

</head>

<body>

<div id="round">Раунд 1</div>
<div id="timer">03:00</div>

<div>
  <button id="start">Старт</button>
  <button id="stop">Стоп</button>
  <button id="reset">Сброс</button>
</div>

<br>

<!-- Цвет -->
<div>
  <button onclick="setColor('red')">Красный</button>
  <button onclick="setColor('lime')">Зелёный</button>
  <button onclick="setColor('yellow')">Жёлтый</button>
  <button onclick="setColor('cyan')">Голубой</button>
  <button onclick="setColor('white')">Белый</button>
</div>

<br>

<!-- Язык -->
<select id="langSelect">
  <option value="ru">Русский</option>
  <option value="en">English</option>
  <option value="uk">Українська</option>
  <option value="cs">Čeština</option>
  <option value="pl">Polski</option>
</select>

<script>

let audioCtx;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function playBeep(freq, duration) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.frequency.value = freq;
  osc.type = "sine";

  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

// 🎨 ИСПРАВЛЕННАЯ смена цвета
function setColor(color) {
  document.body.style.color = color;

  document.querySelectorAll("button").forEach(btn => {
    btn.style.borderColor = color;
    btn.style.color = color;
    btn.style.boxShadow = `0 0 10px ${color}`;
  });

  document.getElementById("timer").style.textShadow =
    `0 0 10px ${color}, 0 0 20px ${color}, 0 0 40px ${color}`;
}

// 🌍 переводы
const translations = {
  ru: { round:"Раунд", rest:"Отдых", end:"Бой окончен!" },
  en: { round:"Round", rest:"Rest", end:"Fight over!" },
  uk: { round:"Раунд", rest:"Відпочинок", end:"Бій закінчено!" },
  cs: { round:"Kolo", rest:"Odpočinek", end:"Konec zápasu!" },
  pl: { round:"Runda", rest:"Przerwa", end:"Koniec walki!" }
};

// ⏱ настройки
let roundTime = 180;
let restTime = 60;
let totalRounds = 5;

let currentRound = 1;
let isRest = false;
let seconds = roundTime;
let interval = null;

// элементы
const timerEl = document.getElementById("timer");
const roundEl = document.getElementById("round");
const langSelect = document.getElementById("langSelect");

// обновление
function update() {
  let m = Math.floor(seconds / 60);
  let s = seconds % 60;

  timerEl.textContent =
    String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');

  const t = translations[langSelect.value];

  roundEl.textContent = isRest
    ? `${t.rest} ${currentRound}`
    : `${t.round} ${currentRound}`;
}

// таймер
function tick() {

  if (seconds <= 10 && seconds > 0) {
    playBeep(800, 0.1);
  }

  if (seconds > 0) {
    seconds--;
  } else {

    playBeep(200, 0.5);

    if (!isRest) {
      isRest = true;
      seconds = restTime;
    } else {
      isRest = false;
      currentRound++;

      if (currentRound > totalRounds) {
        clearInterval(interval);
        timerEl.textContent = "00:00";
        roundEl.textContent = translations[langSelect.value].end;
        return;
      }

      seconds = roundTime;
    }

    playBeep(200, 0.5);
  }

  update();
}

// кнопки
document.getElementById("start").onclick = () => {
  initAudio(); // 🔥 ВАЖНО
  audioCtx.resume();

  if (!interval) interval = setInterval(tick, 1000);
};

document.getElementById("stop").onclick = () => {
  clearInterval(interval);
  interval = null;
};

document.getElementById("reset").onclick = () => {
  clearInterval(interval);
  interval = null;
  currentRound = 1;
  isRest = false;
  seconds = roundTime;
  update();
};

langSelect.onchange = update;

update();

</script>

</body>
</html>
